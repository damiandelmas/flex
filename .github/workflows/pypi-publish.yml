name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, matching pyproject.toml"
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish getflex
    if: github.repository == 'damiandelmas/flex'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Validate requested version
        run: |
          python - <<'PY'
          import os
          import sys
          import tomllib
          from pathlib import Path

          requested = os.environ["REQUESTED_VERSION"].lstrip("v")
          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          if version != requested:
              print(f"requested version {requested!r} does not match pyproject.toml {version!r}", file=sys.stderr)
              sys.exit(1)
          print(f"publishing getflex {version}")
          PY
        env:
          REQUESTED_VERSION: ${{ inputs.version }}

      - name: Build wheel
        run: |
          python -m pip install --upgrade build twine
          SOURCE_DATE_EPOCH=0 python -m build --wheel --outdir dist
          python -m twine check dist/*
          sha256sum dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
