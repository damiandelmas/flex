name: Build (macOS)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: pip install -e .

      - name: Smoke — import
        run: python -c "import flex; print('import OK')"

      - name: Smoke — CLI
        run: flex --help

      - name: Tests
        run: |
          pip install pytest
          pytest tests/ -x -q --ignore=tests/test_init_e2e.py
